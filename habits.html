<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Hábitos</title>
  <link rel="stylesheet" href="styles.css?v=3">
  <style>
    body {
      padding-bottom: 70px;
    }
    .habits-page {
      padding-bottom: 90px;
    }
    
    .taskbar-user {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.25rem;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: background 0.2s;
    }
    
    .taskbar-user:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .user-menu {
      position: fixed;
      bottom: 70px;
      right: 10px;
      background: var(--card);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      min-width: 200px;
      z-index: 1001;
      overflow: hidden;
    }
    
    .user-menu.modal-hidden {
      display: none !important;
    }
    
    .user-menu-content {
      padding: 8px 0;
    }
    
    .user-info {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    
    .user-icon {
      font-size: 1.5rem;
    }
    
    #user-email {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    
    .user-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.875rem;
      transition: background 0.2s;
    }
    
    .user-menu-item:hover {
      background: var(--input-bg);
    }
  </style>
</head>
<body>
  <div class="container habits-page">
  <div class="container">
    <h1>🎯 Mis Hábitos</h1>
    
    <div class="date-header" id="current-date"></div>

    <!-- Create Habit Form -->
    <div class="card mt-md">
      <h2>➕ Nuevo Hábito</h2>
      <form id="habit-form">
        <div class="form-group">
          <label for="habit-input">Nombre del hábito</label>
          <input type="text" id="habit-input" class="input" placeholder="Ej: Leer 30 minutos" required>
        </div>
        
        <div class="form-group">
          <label for="habit-notes">Notas / Objetivo (opcional)</label>
          <input type="text" id="habit-notes" class="input" placeholder="Ej: Terminar el libro de autos">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="habit-category">Categoría</label>
            <select id="habit-category" class="input"></select>
          </div>
          <div class="form-group">
            <label for="habit-frequency">Frecuencia</label>
            <select id="habit-frequency" class="input">
              <option value="Diario">Diario</option>
              <option value="Semanal">Semanal</option>
              <option value="Días específicos">Días específicos</option>
            </select>
          </div>
        </div>
        
        <button type="submit" class="btn btn-secondary" style="width: 100%;">+ Crear Hábito</button>
      </form>

      <!-- Category Management -->
      <div class="section-header mt-md">
        <h3>Categorías</h3>
      </div>
      <div class="form-row">
        <input type="text" id="new-habit-cat" class="input" placeholder="Nueva categoría">
        <button class="btn btn-primary" onclick="addCategory('habits', document.getElementById('new-habit-cat').value)">+</button>
      </div>
      <div id="habit-category-list" class="category-list"></div>
    </div>

    <!-- Habit Checklist -->
    <div class="card mt-md">
      <div class="section-header">
        <h2>📋 Mis Hábitos</h2>
      </div>
      <div id="habit-checklist"></div>
    </div>

    <!-- Link back -->
    <div class="export-section mt-md">
      <a href="index.html" class="btn btn-ghost" style="text-decoration: none;">
        ← Volver al Dashboard
      </a>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal modal-hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>✏️ Editar Hábito</h2>
        <button class="modal-close" onclick="closeEditModal()">✕</button>
      </div>
      <form id="edit-habit-form">
        <input type="hidden" id="edit-habit-id">
        
        <div class="form-group">
          <label for="edit-habit-input">Nombre</label>
          <input type="text" id="edit-habit-input" class="input" required>
        </div>
        
        <div class="form-group">
          <label for="edit-habit-notes">Notas</label>
          <input type="text" id="edit-habit-notes" class="input">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="edit-habit-category">Categoría</label>
            <select id="edit-habit-category" class="input"></select>
          </div>
          <div class="form-group">
            <label for="edit-habit-frequency">Frecuencia</label>
            <select id="edit-habit-frequency" class="input">
              <option value="Diario">Diario</option>
              <option value="Semanal">Semanal</option>
              <option value="Días específicos">Días específicos</option>
            </select>
          </div>
        </div>
        
        <div class="form-actions">
          <button type="submit" class="btn btn-secondary" style="flex: 1;">💾 Guardar</button>
          <button type="button" class="btn btn-ghost" onclick="closeEditModal()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Windows Taskbar -->
  <nav class="taskbar">
    <div class="taskbar-right">
      <button class="taskbar-theme" id="theme-toggle" title="Cambiar tema">🌙</button>
      <button class="taskbar-user" id="user-btn" title="Usuario" onclick="toggleUserMenu()">👤</button>
    </div>
    
    <div class="taskbar-center">
      <a href="home.html" class="taskbar-item">
        <span class="icon">🏠</span>
        <span>Inicio</span>
      </a>
      <a href="index.html" class="taskbar-item">
        <span class="icon">📊</span>
        <span>Dashboard</span>
      </a>
      <a href="converter.html" class="taskbar-item">
        <span class="icon">💱</span>
        <span>Conversor</span>
      </a>
      <a href="habits.html" class="taskbar-item active">
        <span class="icon">🎯</span>
        <span>Habitos</span>
      </a>
      <a href="data.html" class="taskbar-item">
        <span class="icon">⚙️</span>
        <span>Datos</span>
      </a>
    </div>
    
    <div class="taskbar-right">
      <div class="taskbar-clock">
        <span class="taskbar-clock-time" id="clock-time">00:00</span>
        <span id="clock-date">01/01/2026</span>
      </div>
    </div>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js?v=3"></script>
  <script>
    async function syncFromCloud() {
      const user = getCurrentUser();
      if (!user) return;
      try {
        const doc = await db.collection('users').doc(user.uid).get();
        if (doc.exists) {
          localStorage.setItem(DB_NAME, JSON.stringify(doc.data()));
          if (typeof renderHabitChecklist === 'function') renderHabitChecklist();
        }
      } catch (err) {
        console.error('Error syncing:', err);
      }
    }
    
    // Clock
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
      document.getElementById('clock-time').textContent = time;
      document.getElementById('clock-date').textContent = date;
    }
    updateClock();
    setInterval(updateClock, 1000);
    
    if (typeof auth !== 'undefined') {
      auth.onAuthStateChanged(user => {
        if (user) syncFromCloud();
      });
    }
    
    initTheme();
  </script>
  
  <!-- User Menu Dropdown -->
  <div id="user-menu" class="user-menu modal-hidden">
    <div class="user-menu-content">
      <div id="user-info" class="user-info">
        <span class="user-icon">👤</span>
        <span id="user-email">No conectado</span>
      </div>
      <a href="login.html" class="user-menu-item" id="login-link">
        <span>🔑</span> Iniciar sesion
      </a>
      <a href="#" class="user-menu-item" id="logout-link" onclick="signOutUser(); return false;" style="display: none;">
        <span>🚪</span> Cerrar sesion
      </a>
    </div>
  </div>
  
  <script>
    function toggleUserMenu() {
      const menu = document.getElementById('user-menu');
      menu.classList.toggle('modal-hidden');
    }
    
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('user-menu');
      const btn = document.getElementById('user-btn');
      if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
        menu.classList.add('modal-hidden');
      }
    });
    
    if (typeof auth !== 'undefined') {
      auth.onAuthStateChanged(user => {
        const loginLink = document.getElementById('login-link');
        const logoutLink = document.getElementById('logout-link');
        const userEmail = document.getElementById('user-email');
        if (user && loginLink && logoutLink && userEmail) {
          userEmail.textContent = user.email;
          loginLink.style.display = 'none';
          logoutLink.style.display = 'flex';
        }
      });
    }
  </script>
</body>
</html>
