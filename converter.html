<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Conversor BS - USD</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .converter-page {
      text-align: center;
      padding-top: 20px;
    }
    
    .taskbar-user {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.25rem;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: background 0.2s;
    }
    
    .taskbar-user:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .user-menu {
      position: fixed;
      bottom: 70px;
      right: 10px;
      background: var(--card);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      min-width: 200px;
      z-index: 1001;
      overflow: hidden;
    }
    
    .user-menu.modal-hidden {
      display: none !important;
    }
    
    .user-menu-content {
      padding: 8px 0;
    }
    
    .user-info {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    
    .user-icon {
      font-size: 1.5rem;
    }
    
    #user-email {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    
    .user-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.875rem;
      transition: background 0.2s;
    }
    
    .user-menu-item:hover {
      background: var(--input-bg);
    }
    
    .converter-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 32px;
      max-width: 400px;
      margin: 0 auto;
      box-shadow: var(--shadow-md);
    }
    
    .converter-title {
      font-size: 1.5rem;
      margin-bottom: 24px;
      color: var(--text);
    }
    
    .converter-input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    
    .converter-input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    
    .converter-input-row {
      display: flex;
      gap: 8px;
    }
    
    .converter-input-row input {
      flex: 1;
    }
    
    .rate-badge {
      background: linear-gradient(135deg, var(--secondary), #0D9668);
      color: white;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      margin-bottom: 24px;
      font-weight: 600;
    }
    
    .rate-badge .rate-value {
      font-size: 1.5rem;
      display: block;
      margin-top: 4px;
    }
    
    .rate-badge.error {
      background: var(--danger);
    }
    
    .rate-badge.loading {
      background: var(--primary);
    }
    
    .swap-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
      margin-bottom: 20px;
      transition: all 0.2s;
    }
    
    .swap-btn:hover {
      background: var(--primary-dark);
    }
    
    .result-box {
      background: linear-gradient(135deg, var(--primary), var(--purple));
      color: white;
      padding: 24px;
      border-radius: var(--radius-md);
    }
    
    .result-label {
      font-size: 0.875rem;
      opacity: 0.9;
    }
    
    .result-value {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 8px;
    }
    
    .refresh-btn {
      background: transparent;
      border: 2px solid var(--secondary);
      color: var(--secondary);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      margin-top: 16px;
      font-size: 0.875rem;
      transition: all 0.2s;
    }
    
    .refresh-btn:hover {
      background: var(--secondary);
      color: white;
    }
    
    .direction-indicator {
      background: var(--input-bg);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 20px;
      font-weight: 500;
    }
    
    .currency-selector {
      margin-bottom: 16px;
    }
    
    .currency-selector select {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="container converter-page">
      <div class="converter-card">
      <h1 class="converter-title">Conversor BS - USD/EUR</h1>
      
      <div class="rate-badge loading" id="rate-badge">
        Tasa BCV
        <span class="rate-value" id="rate-value">Obteniendo...</span>
      </div>
      
      <div class="currency-selector">
        <select id="currency-select" class="input">
          <option value="USD">USD - Dolar</option>
          <option value="EUR">EUR - Euro</option>
        </select>
      </div>
      
      <div class="direction-indicator" id="direction">BS → USD</div>
      
      <div class="converter-input-group">
        <label>Bolivares (BS)</label>
        <div class="converter-input-row">
          <input type="number" id="bs-input" class="input" placeholder="0.00" value="1000">
        </div>
      </div>
      
      <button class="swap-btn" id="convert-btn">
        Convertir a USD
      </button>
      
      <div class="converter-input-group">
        <label>Dolares (USD)</label>
        <div class="converter-input-row">
          <input type="number" id="usd-input" class="input" placeholder="0.00">
        </div>
      </div>
      
      <div class="result-box">
        <div class="result-label">Resultado</div>
        <div class="result-value" id="result">$0.00 USD</div>
      </div>
      
      <button class="refresh-btn" id="refresh-btn">
        Actualizar tasa BCV
      </button>
    </div>
  </div>
  
  <!-- Windows Taskbar -->
  <nav class="taskbar">
    <div class="taskbar-right">
      <button class="taskbar-theme" id="theme-toggle" title="Cambiar tema">🌙</button>
      <button class="taskbar-user" id="user-btn" title="Usuario" onclick="toggleUserMenu()">👤</button>
    </div>
    
    <div class="taskbar-center">
      <a href="home.html" class="taskbar-item">
        <span class="icon">🏠</span>
        <span>Inicio</span>
      </a>
      <a href="index.html" class="taskbar-item">
        <span class="icon">📊</span>
        <span>Dashboard</span>
      </a>
      <a href="converter.html" class="taskbar-item active">
        <span class="icon">💱</span>
        <span>Conversor</span>
      </a>
      <a href="habits.html" class="taskbar-item">
        <span class="icon">🎯</span>
        <span>Habitos</span>
      </a>
      <a href="data.html" class="taskbar-item">
        <span class="icon">⚙️</span>
        <span>Datos</span>
      </a>
    </div>
    
    <div class="taskbar-right">
      <div class="taskbar-clock">
        <span class="taskbar-clock-time" id="clock-time">00:00</span>
        <span id="clock-date">01/01/2026</span>
      </div>
    </div>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
  <script>
    (function() {
      function initThemeInline() {
        const btn = document.getElementById('theme-toggle');
        if (!btn) return;
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        btn.textContent = saved === 'dark' ? '☀️' : '🌙';
        btn.addEventListener('click', () => {
          const current = document.documentElement.getAttribute('data-theme');
          const next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          btn.textContent = next === 'dark' ? '☀️' : '🌙';
        });
      }
      
      const API_URLS = [
        'https://bcv-api.rafnixg.dev/rates/',
        'https://pydolarvenezuela-api.vercel.app/api/v1/dollar?page=bcv',
        'https://api.datyapi.com/dollar'
      ];
      const STORAGE_KEY_USD = 'bcvRateUSD';
      const STORAGE_KEY_EUR = 'bcvRateEUR';
      
      let rates = { USD: 0, EUR: 0 };
      let currentCurrency = 'USD';
      let apiStatus = { checked: false, working: null };
      
      const rateBadge = document.getElementById('rate-badge');
      const rateValue = document.getElementById('rate-value');
      const bsInput = document.getElementById('bs-input');
      const usdInput = document.getElementById('usd-input');
      const resultEl = document.getElementById('result');
      const convertBtn = document.getElementById('convert-btn');
      const refreshBtn = document.getElementById('refresh-btn');
      const directionEl = document.getElementById('direction');
      const currencySelect = document.getElementById('currency-select');
      
      function updateClock() {
        const now = new Date();
        document.getElementById('clock-time').textContent = 
          now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('clock-date').textContent = 
          now.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
      }
      
      function getCurrentRate() {
        return rates[currentCurrency] || 0;
      }
      
      function getCurrencySymbol() {
        return currentCurrency === 'USD' ? '$' : '€';
      }
      
      function convertBStoCurrency() {
        const rate = getCurrentRate();
        if (rate <= 0) return;
        const bs = parseFloat(bsInput.value) || 0;
        const result = bs / rate;
        usdInput.value = result.toFixed(2);
        const symbol = getCurrencySymbol();
        resultEl.textContent = symbol + result.toFixed(2) + ' ' + currentCurrency;
        directionEl.textContent = 'BS → ' + currentCurrency;
      }
      
      function convertCurrencyToBS() {
        const rate = getCurrentRate();
        if (rate <= 0) return;
        const currencyValue = parseFloat(usdInput.value) || 0;
        const bs = currencyValue * rate;
        bsInput.value = bs.toFixed(2);
        resultEl.textContent = bs.toLocaleString('es-ES') + ' BS';
        directionEl.textContent = currentCurrency + ' → BS';
      }
      
      function updateRateDisplay() {
        const rate = getCurrentRate();
        if (rate > 0) {
          rateBadge.className = 'rate-badge';
          rateValue.textContent = '1 ' + currentCurrency + ' = ' + rate.toLocaleString('es-ES', { minimumFractionDigits: 2 }) + ' BS';
        }
      }
      
      function setRate(currency, rate) {
        rates[currency] = rate;
        localStorage.setItem(currency === 'USD' ? STORAGE_KEY_USD : STORAGE_KEY_EUR, rate.toString());
        updateRateDisplay();
        convertBStoCurrency();
      }
      
      function setError(message) {
        rateBadge.className = 'rate-badge error';
        rateValue.textContent = message;
      }
      
      function setLoading() {
        rateBadge.className = 'rate-badge loading';
        rateValue.textContent = 'Obteniendo tasas...';
      }
      
      function changeCurrency() {
        currentCurrency = currencySelect.value;
        updateRateDisplay();
        convertBStoCurrency();
      }
      
      function getLastSavedRate() {
        const savedUSD = localStorage.getItem(STORAGE_KEY_USD);
        const savedEUR = localStorage.getItem(STORAGE_KEY_EUR);
        if (savedUSD) rates.USD = parseFloat(savedUSD);
        if (savedEUR) rates.EUR = parseFloat(savedEUR);
        return rates.USD > 0;
      }
      
      function showSavedRate() {
        if (rates.USD > 0) {
          rateBadge.className = 'rate-badge';
          updateRateDisplay();
          convertBStoCurrency();
          return true;
        }
        return false;
      }
      
      async function tryFetch(url) {
        const proxies = [
          { url: 'https://api.allorigins.win/get?url=', type: 'proxy' },
          { url: 'https://corsproxy.io/?', type: 'proxy' },
          { url: '', type: 'direct' }
        ];
        
        for (const { url: proxy, type } of proxies) {
          try {
            const fullUrl = type === 'proxy' ? proxy + encodeURIComponent(url) : url;
            const response = await Promise.race([
              fetch(fullUrl, type === 'direct' ? { mode: 'cors' } : {}),
              new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000))
            ]);
            
            if (!response.ok) continue;
            let data;
            const text = await response.text();
            
            if (type === 'proxy') {
              const json = JSON.parse(text);
              data = JSON.parse(json.contents);
            } else {
              data = JSON.parse(text);
            }
            
            let dollar = null;
            let euro = null;
            
            if (data.dollar) dollar = parseFloat(data.dollar);
            else if (data.usd) dollar = parseFloat(data.usd);
            else if (data.monitors && data.monitors.usd) dollar = parseFloat(data.monitors.usd.price);
            else if (data.price) dollar = parseFloat(data.price);
            
            if (data.euro) euro = parseFloat(data.euro);
            else if (data.eur) euro = parseFloat(data.eur);
            
            if (dollar && dollar > 0) {
              setRate('USD', dollar);
              if (euro && euro > 0) setRate('EUR', euro);
              return true;
            }
          } catch (e) {
            console.log('Failed:', type, e.message);
            continue;
          }
        }
        return false;
      }
      
      async function fetchRates() {
        if (!showSavedRate()) {
          setLoading();
        }
        
        for (const apiUrl of API_URLS) {
          const success = await tryFetch(apiUrl);
          if (success) return;
        }
        
        if (rates.USD <= 0) {
          setError('Tasa no disponible');
        }
      }
      
      // Event listeners
      bsInput.addEventListener('input', convertBStoCurrency);
      usdInput.addEventListener('input', convertCurrencyToBS);
      convertBtn.addEventListener('click', convertBStoCurrency);
      refreshBtn.addEventListener('click', fetchRates);
      currencySelect.addEventListener('change', changeCurrency);
      
      // Initialize
      function init() {
        initThemeInline();
        updateClock();
        setInterval(updateClock, 1000);
        getLastSavedRate();
        fetchRates();
      }
      
      init();
    })();
  </script>
  
  <!-- User Menu Dropdown -->
  <div id="user-menu" class="user-menu modal-hidden">
    <div class="user-menu-content">
      <div id="user-info" class="user-info">
        <span class="user-icon">👤</span>
        <span id="user-email">No conectado</span>
      </div>
      <a href="login.html" class="user-menu-item" id="login-link">
        <span>🔑</span> Iniciar sesion
      </a>
      <a href="#" class="user-menu-item" id="logout-link" onclick="signOutUser(); return false;" style="display: none;">
        <span>🚪</span> Cerrar sesion
      </a>
    </div>
  </div>
  
  <script>
    function toggleUserMenu() {
      const menu = document.getElementById('user-menu');
      menu.classList.toggle('modal-hidden');
    }
    
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('user-menu');
      const btn = document.getElementById('user-btn');
      if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
        menu.classList.add('modal-hidden');
      }
    });
    
    if (typeof auth !== 'undefined') {
      auth.onAuthStateChanged(user => {
        const loginLink = document.getElementById('login-link');
        const logoutLink = document.getElementById('logout-link');
        const userEmail = document.getElementById('user-email');
        if (user && loginLink && logoutLink && userEmail) {
          userEmail.textContent = user.email;
          loginLink.style.display = 'none';
          logoutLink.style.display = 'flex';
        }
      });
    }
  </script>
</body>
</html>
