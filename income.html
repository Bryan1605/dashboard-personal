<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresos - Dashboard Personal</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .income-page {
      padding-bottom: 80px;
    }
    
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
      gap: var(--space-md);
    }
    
    .page-title {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    
    .page-title h1 {
      margin-bottom: 0;
    }
    
    .total-card {
      background: linear-gradient(135deg, var(--secondary) 0%, #059669 100%);
      color: white;
      padding: var(--space-lg) var(--space-xl);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    
    .total-card .label {
      font-size: 0.875rem;
      opacity: 0.9;
      margin-bottom: var(--space-xs);
    }
    
    .total-card .value {
      font-size: 1.75rem;
      font-weight: 700;
    }
    
    .total-card .period {
      font-size: 0.75rem;
      opacity: 0.8;
      margin-top: var(--space-xs);
    }
    
    .filter-bar {
      display: flex;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
      align-items: center;
    }
    
    .filter-bar select {
      padding: 10px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-size: 0.875rem;
    }
    
    .transaction-card {
      background: var(--card);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-sm);
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all var(--transition-fast);
    }
    
    .transaction-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    
    .transaction-info {
      flex: 1;
    }
    
    .transaction-source {
      font-weight: 600;
      color: var(--text);
      font-size: 1rem;
    }
    
    .transaction-date {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    
    .transaction-amount {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--success);
    }
    
    .transaction-actions {
      display: flex;
      gap: var(--space-sm);
      margin-left: var(--space-md);
    }
    
    .transaction-actions button {
      background: var(--input-bg);
      border: none;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.875rem;
      transition: all var(--transition-fast);
    }
    
    .transaction-actions button:hover {
      background: var(--border);
    }
    
    .transaction-actions .btn-edit {
      color: var(--primary);
    }
    
    .transaction-actions .btn-delete {
      color: var(--danger);
    }
    
    .empty-state {
      text-align: center;
      padding: var(--space-xl);
      color: var(--text-secondary);
    }
    
    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: var(--space-md);
    }
    
    .add-form-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      margin-bottom: var(--space-lg);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
    }
    
    .add-form-card h3 {
      margin-bottom: var(--space-md);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    
    .taskbar-user {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.25rem;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: background 0.2s;
    }
    
    .taskbar-user:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .user-menu {
      position: fixed;
      bottom: 70px;
      right: 10px;
      background: var(--card);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      min-width: 200px;
      z-index: 1001;
      overflow: hidden;
    }
    
    .user-menu.modal-hidden {
      display: none !important;
    }
    
    .user-menu-content {
      padding: 8px 0;
    }
    
    .user-info {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    
    .user-icon {
      font-size: 1.5rem;
    }
    
    #user-email {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    
    .user-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.875rem;
      transition: background 0.2s;
      cursor: pointer;
    }
    
    .user-menu-item:hover {
      background: var(--input-bg);
    }
    
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1002;
    }
    
    .modal-backdrop.modal-hidden {
      display: none;
    }
    
    .edit-modal {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      width: 90%;
      max-width: 400px;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .edit-modal h3 {
      margin-bottom: var(--space-lg);
      color: var(--text);
    }
    
    .edit-modal .form-group {
      margin-bottom: var(--space-md);
    }
    
    .edit-modal label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: var(--text);
      font-size: 0.875rem;
    }
    
    .edit-modal input {
      width: 100%;
      padding: 12px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.875rem;
    }
    
    .modal-buttons {
      display: flex;
      gap: var(--space-md);
      margin-top: var(--space-lg);
    }
    
    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius-md);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-save {
      background: var(--success);
      color: white;
      border: none;
    }
    
    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="container income-page">
    <div class="page-header">
      <div class="page-title">
        <h1>💰 Ingresos</h1>
      </div>
      <div class="total-card">
        <div class="label">Total Este Mes</div>
        <div class="value" id="total-income">$0.00</div>
        <div class="period" id="income-period"></div>
      </div>
    </div>
    
    <div class="filter-bar">
      <select id="income-filter-month" onchange="renderIncomeList()">
        <option value="all">Todos los meses</option>
      </select>
      <select id="income-filter-year" onchange="renderIncomeList()">
        <option value="all">Todos los años</option>
      </select>
    </div>
    
    <div class="add-form-card">
      <h3>➕ Agregar Ingreso</h3>
      <form id="add-income-form">
        <div class="form-row">
          <div class="form-group">
            <label>Fuente</label>
            <input type="text" id="income-source" class="input" placeholder="Ej: Salario, Freelance" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Monto</label>
            <input type="number" id="income-amount" class="input" placeholder="0.00" step="0.01" required>
          </div>
          <div class="form-group">
            <label>Fecha</label>
            <input type="date" id="income-date" class="input" required>
          </div>
        </div>
        <button type="submit" class="btn btn-secondary" style="width: 100%;">+ Añadir Ingreso</button>
      </form>
    </div>
    
    <h3 style="margin-bottom: var(--space-md);">📋 Historial de Ingresos</h3>
    <div id="income-list-full"></div>
  </div>
  
  <nav class="taskbar">
    <div class="taskbar-right">
      <button class="taskbar-theme" id="theme-toggle" title="Cambiar tema" onclick="toggleTheme()">🌙</button>
      <button class="taskbar-user" id="user-btn" title="Usuario" onclick="toggleUserMenu()">👤</button>
    </div>
    
    <div class="taskbar-center">
      <a href="home.html" class="taskbar-item">
        <span class="icon">🏠</span>
        <span>Inicio</span>
      </a>
      <a href="index.html" class="taskbar-item">
        <span class="icon">📊</span>
        <span>Dashboard</span>
      </a>
      <a href="converter.html" class="taskbar-item">
        <span class="icon">💱</span>
        <span>Cambio</span>
      </a>
      <a href="income.html" class="taskbar-item active">
        <span class="icon">💰</span>
        <span>Ingresos</span>
      </a>
      <a href="expenses.html" class="taskbar-item">
        <span class="icon">🛒</span>
        <span>Gastos</span>
      </a>
      <a href="debts.html" class="taskbar-item">
        <span class="icon">📋</span>
        <span>Deudas</span>
      </a>
      <a href="habits.html" class="taskbar-item">
        <span class="icon">🎯</span>
        <span>Habitos</span>
      </a>
      <a href="data.html" class="taskbar-item">
        <span class="icon">⚙️</span>
        <span>Datos</span>
      </a>
      <a href="profile.html" class="taskbar-item">
        <span class="icon">👤</span>
        <span>Perfil</span>
      </a>
    </div>
  </nav>
  
  <div class="user-menu modal-hidden" id="user-menu">
    <div class="user-menu-content">
      <div class="user-info">
        <span class="user-icon">👤</span>
        <span id="user-email">usuario@email.com</span>
      </div>
      <a href="profile.html" class="user-menu-item">
        <span>👤</span>
        <span>Perfil</span>
      </a>
      <div class="user-menu-item" onclick="toggleTheme()">
        <span>🌙</span>
        <span>Cambiar tema</span>
      </div>
      <div class="user-menu-item" onclick="logout()">
        <span>🚪</span>
        <span>Cerrar sesión</span>
      </div>
    </div>
  </div>
  
  <div class="modal-backdrop modal-hidden" id="edit-modal-backdrop" onclick="closeEditModal(event)">
    <div class="edit-modal" onclick="event.stopPropagation()">
      <h3>✏️ Editar Ingreso</h3>
      <input type="hidden" id="edit-income-id">
      <div class="form-group">
        <label>Fuente</label>
        <input type="text" id="edit-income-source" class="input" required>
      </div>
      <div class="form-group">
        <label>Monto</label>
        <input type="number" id="edit-income-amount" class="input" step="0.01" required>
      </div>
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="edit-income-date" class="input" required>
      </div>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeEditModal()">Cancelar</button>
        <button class="btn-save" onclick="saveIncomeEdit()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
  <script>
    let editingIncomeId = null;
    
    function initIncomePage() {
      const now = new Date();
      const months = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                      'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
      document.getElementById('income-period').textContent = months[now.getMonth()] + ' ' + now.getFullYear();
      document.getElementById('income-date').value = now.toISOString().split('T')[0];
      
      populateMonthFilter();
      renderIncomeList();
      
      document.getElementById('add-income-form').addEventListener('submit', function(e) {
        e.preventDefault();
        addIncomeFromPage();
      });
    }
    
    function populateMonthFilter() {
      const monthSelect = document.getElementById('income-filter-month');
      const yearSelect = document.getElementById('income-filter-year');
      const months = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                      'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
      
      const now = new Date();
      for (let i = 0; i <= now.getMonth(); i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = months[i];
        monthSelect.appendChild(opt);
      }
      monthSelect.value = now.getMonth();
      
      for (let y = now.getFullYear(); y >= now.getFullYear() - 5; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        yearSelect.appendChild(opt);
      }
      yearSelect.value = now.getFullYear();
    }
    
    function renderIncomeList() {
      const db = getDB();
      const income = db.income || [];
      const monthFilter = document.getElementById('income-filter-month').value;
      const yearFilter = document.getElementById('income-filter-year').value;
      
      let filtered = [...income];
      
      if (monthFilter !== 'all') {
        filtered = filtered.filter(i => new Date(i.date).getMonth() === parseInt(monthFilter));
      }
      if (yearFilter !== 'all') {
        filtered = filtered.filter(i => new Date(i.date).getFullYear() === parseInt(yearFilter));
      }
      
      filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
      
      const total = filtered.reduce((sum, i) => sum + parseFloat(i.amount || 0), 0);
      document.getElementById('total-income').textContent = formatCurrency(total);
      
      const container = document.getElementById('income-list-full');
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">💰</div>
            <p>No hay ingresos registrados</p>
            <p class="text-secondary">Agrega tu primer ingreso arriba</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = filtered.map(item => `
        <div class="transaction-card">
          <div class="transaction-info">
            <div class="transaction-source">${escapeHtml(item.source)}</div>
            <div class="transaction-date">${formatDate(item.date)}</div>
          </div>
          <div class="transaction-amount">+${formatCurrency(parseFloat(item.amount))}</div>
          <div class="transaction-actions">
            <button class="btn-edit" onclick="openEditIncome(${item.id})">✏️</button>
            <button class="btn-delete" onclick="deleteIncome(${item.id})">🗑️</button>
          </div>
        </div>
      `).join('');
    }
    
    function addIncomeFromPage() {
      const source = document.getElementById('income-source').value;
      const amount = parseFloat(document.getElementById('income-amount').value);
      const date = document.getElementById('income-date').value;
      
      if (!source || !amount || !date) return;
      
      const db = getDB();
      if (!db.income) db.income = [];
      
      db.income.push({
        id: Date.now(),
        source,
        amount,
        date
      });
      
      saveDB(db);
      document.getElementById('add-income-form').reset();
      document.getElementById('income-date').value = new Date().toISOString().split('T')[0];
      
      addXP(5);
      renderIncomeList();
    }
    
    function openEditIncome(id) {
      const db = getDB();
      const income = db.income.find(i => i.id === id);
      if (!income) return;
      
      editingIncomeId = id;
      document.getElementById('edit-income-id').value = id;
      document.getElementById('edit-income-source').value = income.source;
      document.getElementById('edit-income-amount').value = income.amount;
      document.getElementById('edit-income-date').value = income.date;
      
      document.getElementById('edit-modal-backdrop').classList.remove('modal-hidden');
    }
    
    function closeEditModal(event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById('edit-modal-backdrop').classList.add('modal-hidden');
      editingIncomeId = null;
    }
    
    function saveIncomeEdit() {
      const id = editingIncomeId;
      const db = getDB();
      const income = db.income.find(i => i.id === id);
      
      if (income) {
        income.source = document.getElementById('edit-income-source').value;
        income.amount = parseFloat(document.getElementById('edit-income-amount').value);
        income.date = document.getElementById('edit-income-date').value;
        
        saveDB(db);
        closeEditModal();
        renderIncomeList();
      }
    }
    
    function deleteIncome(id) {
      if (!confirm('¿Eliminar este ingreso?')) return;
      
      const db = getDB();
      db.income = db.income.filter(i => i.id !== id);
      saveDB(db);
      renderIncomeList();
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('es-VE', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      initTheme();
      initIncomePage();
    });
  </script>
</body>
</html>
